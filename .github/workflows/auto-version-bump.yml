name: Auto Version Bump

on:
  push:
    branches:
      - master

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump patch version in plugin.json
        run: |
          FILE="plugins/yuki-toolkit/.claude-plugin/plugin.json"
          CURRENT=$(jq -r '.version' "$FILE")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          jq --arg v "$NEW_VERSION" '.version = $v' "$FILE" > tmp.json && mv tmp.json "$FILE"
          echo "Bumped version: $CURRENT -> $NEW_VERSION"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/yuki-toolkit/.claude-plugin/plugin.json
          git diff --cached --quiet && echo "No version change needed" && exit 0
          git commit -m "chore: bump plugin version to $(jq -r '.version' plugins/yuki-toolkit/.claude-plugin/plugin.json)"
          git push
